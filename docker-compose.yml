services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:/app/data/techno_penguin.db?mode=rwc
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
      - LEPTOS_ENV=PROD
    restart: unless-stopped

volumes:
  data:
